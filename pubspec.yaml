name: tracker
description: "A project tracker companion for Idadi"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  # Flutter
  flutter:
    sdk: flutter

  # Database / persistence
  drift: ^2.34.0
  path: ^1.9.1
  path_provider: ^2.1.6
  sqlite3_flutter_libs: ^0.6.0+eol

  # Functional programming
  fpdart: ^1.2.0

  # Dependency injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Code generation annotations
  freezed_annotation: ^3.1.0

  # Utilities
  uuid: ^4.5.3
  drift_flutter: ^0.3.0

  # state managment
  flutter_riverpod: ^3.3.2

dev_dependencies:
  # Testing
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5

  # Linting
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_annotation: ^4.12.0
  json_serializable: ^6.14.0
  injectable_generator: ^3.0.2
  drift_dev: ^2.34.0

flutter:
  uses-material-design: true